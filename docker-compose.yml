name: civicpulse

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civicpulse}
      POSTGRES_USER: ${POSTGRES_USER:-civicpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicpulse-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - civicpulse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      target: development
    environment:
      APP_ENV: development
      API_RELOAD: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgresql+psycopg://civicpulse:${POSTGRES_PASSWORD:-civicpulse-local}@postgres:5432/${POSTGRES_DB:-civicpulse}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: ./backend
      target: development
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://civicpulse:${POSTGRES_PASSWORD:-civicpulse-local}@postgres:5432/${POSTGRES_DB:-civicpulse}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  civicpulse-postgres:
  frontend-node-modules:
